<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Dashboard Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="header-container">
    <h1 class="main-title">JavaScript API Dashboard</h1>
  </div>
  <div class="grid-container">
    <section class="grid-item" id="dog-api">
      <h2>🐶 Random Dog</h2>
      <button id="get-dog" onclick="getDogImage()">Get Dog</button>
      <div class="output" id="dog-output"></div>
    </section>

    <section class="grid-item" id="cat-api">
      <h2>🐱 Random Cat</h2>
      <button id="get-cat" onclick="getCatImage()">Get Cat</button>
      <div class="output" id="cat-output"></div>
    </section>

    <section class="grid-item" id="weather-api">
      <h2>☀️ Weather Info</h2>
      <button id="get-weather" onclick="getWeather()">Get Weather</button>
      <div class="output" id="weather-output"></div>
    </section>

    <section class="grid-item" id="currency-api">
      <h2>💱 Currency Rates</h2>
      <button id="get-currency" onclick="getExchangeRates()">Get Rates</button>
      <div class="output" id="currency-output"></div>
    </section>

    <section class="grid-item" id="movies-api">
      <h2>🎮 Trending Movies</h2>
      <button id="get-movies" onclick="getMovies()">Get Movies</button>
      <div class="output" id="movies-output"></div>
    </section>

    <section class="grid-item" id="github-api">
      <h2>🧑‍💻 GitHub User</h2>
      <input type="text" id="github-username" placeholder="Enter GitHub username">
      <button id="get-github" onclick="getGitHubUser()">Get User</button>
      <div class="output" id="github-output"></div>
    </section>

    <section class="grid-item" id="joke-api">
      <h2>🤣 Random Joke</h2>
      <button id="get-joke" onclick="getJoke()">Get Joke</button>
      <div class="output" id="joke-output"></div>
    </section>

    <section class="grid-item" id="food-api">
      <h2>🍔 Food Recipe</h2>
      <button id="get-food" onclick="getFoodApiInfo()">Get Food</button>
      <div class="output" id="food-output"></div>
    </section>
  </div>

  <div class="vehicle-container"></div>

  <script src="script.js"></script>
</body>
</html>
